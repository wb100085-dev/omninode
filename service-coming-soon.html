<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서비스 안내 | ㈜옴니노드</title>
  <link rel="stylesheet" href="styles.css?v=s2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    body {
      background: var(--bg-dark);
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
    }

    .coming-hero {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 10%;
      position: relative;
    }

    .coming-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(8, 12, 20, 1) 0%, rgba(29, 48, 96, 0.3) 100%);
      z-index: 1;
    }

    .coming-content {
      position: relative;
      z-index: 2;
    }

    .coming-badge {
      display: inline-block;
      color: var(--cyan);
      font-size: 1.2rem;
      letter-spacing: 4px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .coming-title {
      font-size: clamp(3rem, 6vw, 5rem);
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 30px;
      word-break: keep-all;
    }

    .coming-desc {
      font-size: 1.3rem;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 700px;
      word-break: keep-all;
      margin-bottom: 50px;
    }

    .coming-back-btn {
      display: inline-block;
      padding: 16px 40px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: #fff;
      font-size: 1rem;
      letter-spacing: 2px;
      text-decoration: none;
      transition: var(--transition);
      background: rgba(255, 255, 255, 0.05);
    }

    .coming-back-btn:hover {
      background: #fff;
      color: var(--bg-dark);
    }
  </style>
</head>

<body class="theme-ssyenc">

  <div class="coming-hero">
    <div class="coming-bg"></div>
    <div class="coming-content">
      <span class="coming-badge">COMING SOON</span>
      <h1 class="coming-title" id="title">서비스</h1>
      <p class="coming-desc" id="desc"></p>
      <a class="coming-back-btn" href="index.html">← BACK TO HOME</a>
    </div>
  </div>

  <script>
    const services = {
      corp: {
        title: 'AI 기업진단 · 창업보육 성과관리',
        desc: '기업 단위 AI 진단(재무·기술 역량, 성장 전략)과 창업보육기관의 입주기업 시장성 분석·성과 관리·PoC 연계·리포팅을 묶은 통합 서비스입니다. 출시에 맞춰 상세 기능을 안내할 예정입니다.'
      },
      policy: {
        title: '정책 타당성 시뮬레이션',
        desc: '지자체·정부의 정책 도입 전, 디지털 트윈 기반 가상 여론·수용성 시뮬레이션으로 타당성을 사전 검증합니다.'
      },
      election: {
        title: '선거 · 정치 여론 분석',
        desc: '가상 투표 시뮬레이션으로 선거 결과를 사전에 점검하고, 유권자 코호트별 정치·여론 동향을 상시 분석하는 서비스입니다.'
      }
    };

    const params = new URLSearchParams(window.location.search);
    let key = params.get('service') || '';
    const alias = { ai: 'corp', incubator: 'corp' };
    if (alias[key]) key = alias[key];
    const info = services[key];

    if (info) {
      document.getElementById('title').textContent = info.title;
      document.getElementById('desc').textContent = info.desc;
      document.title = info.title + ' | ㈜옴니노드';
    } else {
      document.getElementById('title').textContent = '서비스 안내';
      document.getElementById('desc').textContent = '요청하신 서비스 정보를 준비 중입니다.';
    }
  </script>
</body>

</html>
